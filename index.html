<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Query 生产工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAF8F5;--card-bg:#FFF;--text-primary:#1A1A1A;--text-secondary:#6B6560;--text-tertiary:#A09890;--accent:#E8764A;--accent-light:#FFF0EB;--border:#EEEBE7;--shadow-sm:0 1px 3px rgba(120,100,80,.06);--shadow-md:0 4px 16px rgba(120,100,80,.08);--radius-sm:8px;--radius-md:12px;--radius-pill:100px;--font-cn:'Noto Serif SC','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text-primary);font-family:var(--font-cn);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(232,118,74,.06) 0%,transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-300px;left:-200px;width:700px;height:700px;background:radial-gradient(circle,rgba(232,118,74,.04) 0%,transparent 70%);pointer-events:none;z-index:0}
.container{position:relative;z-index:1;max-width:1060px;margin:0 auto;padding:48px 24px 40px}
.header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.header-left h1{font-size:1.75rem;font-weight:700;letter-spacing:-.02em;line-height:1.2}
.header-left h1 span{color:var(--accent)}
.header-left p{margin-top:6px;font-size:.85rem;color:var(--text-tertiary)}
.header-right{display:flex;align-items:center;gap:12px}
.copy-counter{display:flex;align-items:center;gap:6px;padding:6px 14px;background:var(--accent-light);border-radius:var(--radius-pill);font-size:.8rem;color:var(--accent);font-weight:600;white-space:nowrap}
.copy-counter.bump{animation:counterBump .3s ease}
@keyframes counterBump{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.copy-counter svg{width:14px;height:14px;flex-shrink:0}
.hot-badge{display:flex;align-items:center;gap:5px;padding:5px 12px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:var(--radius-pill);font-size:.75rem;color:#16a34a;font-weight:600;white-space:nowrap;transition:opacity .3s}
.hot-badge.offline{background:#fef3c7;border-color:#fde68a;color:#b45309}
.hot-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Age group tabs */
.age-section{margin-bottom:20px}
.age-tabs{display:flex;gap:0;border:1.5px solid var(--border);border-radius:var(--radius-pill);overflow:hidden;width:fit-content}
.age-tab{padding:10px 28px;font-size:.9rem;font-family:var(--font-cn);color:var(--text-secondary);cursor:pointer;border:none;background:var(--card-bg);font-weight:500;transition:all .25s;user-select:none}
.age-tab:not(:last-child){border-right:1.5px solid var(--border)}
.age-tab:hover{color:var(--accent);background:var(--accent-light)}
.age-tab.active{background:var(--accent);color:#FFF;font-weight:600}

.categories-section{margin-bottom:32px}
.section-label{font-size:.75rem;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;font-weight:600}
.categories{display:flex;flex-wrap:wrap;gap:10px}
.cat-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border:1.5px solid var(--border);border-radius:var(--radius-pill);background:var(--card-bg);font-size:.88rem;font-family:var(--font-cn);color:var(--text-secondary);cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);font-weight:400;user-select:none}
.cat-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.cat-btn.active{background:var(--accent);color:#FFF;border-color:var(--accent);box-shadow:0 2px 12px rgba(232,118,74,.25);font-weight:600}
.cat-btn .cat-icon{font-size:1rem;line-height:1}
.query-section{min-height:200px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:var(--text-tertiary);text-align:center}
.empty-state .empty-icon{font-size:2.5rem;margin-bottom:16px;opacity:.5}
.empty-state p{font-size:.95rem;line-height:1.6}
.query-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.query-card{position:relative;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-md);cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);opacity:0;transform:translateY(12px);animation:cardIn .4s cubic-bezier(.25,.46,.45,.94) forwards}
.query-card:hover{border-color:var(--accent);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.query-card:active{transform:translateY(0);box-shadow:var(--shadow-sm)}
.query-card.copied{border-color:var(--accent);background:var(--accent-light)}
.query-card.from-hot::after{content:attr(data-source);position:absolute;top:6px;right:6px;font-size:.6rem;padding:1px 5px;background:#fee2e2;color:#dc2626;border-radius:4px;font-weight:600}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}
.query-text{flex:1;font-size:.92rem;line-height:1.5;color:var(--text-primary);font-weight:400}
.copy-btn{flex-shrink:0;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;border-radius:var(--radius-sm);color:var(--text-tertiary);cursor:pointer;transition:all .2s ease}
.copy-btn:hover{background:var(--accent-light);color:var(--accent)}
.copy-btn svg{width:16px;height:16px}
.refresh-area{display:flex;justify-content:center;margin-top:32px;opacity:0;animation:fadeUp .5s .6s forwards}
@keyframes fadeUp{to{opacity:1}}
.refresh-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 32px;border:1.5px solid var(--border);border-radius:var(--radius-pill);background:var(--card-bg);font-size:.9rem;font-family:var(--font-cn);color:var(--text-secondary);cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);font-weight:600}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.refresh-btn:active{transform:translateY(0)}
.refresh-btn svg{width:16px;height:16px;transition:transform .4s ease}
.refresh-btn:hover svg{transform:rotate(180deg)}
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(20px);padding:10px 24px;background:var(--text-primary);color:#FFF;border-radius:var(--radius-pill);font-size:.82rem;font-family:var(--font-cn);opacity:0;pointer-events:none;transition:all .35s cubic-bezier(.4,0,.2,1);z-index:1000;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.footer{text-align:center;margin-top:56px;padding-top:24px;border-top:1px solid var(--border);font-size:.75rem;color:var(--text-tertiary);letter-spacing:.02em}
@media(max-width:640px){.container{padding:32px 16px}.header{flex-direction:column;align-items:flex-start;gap:16px}.header-left h1{font-size:1.4rem}.query-grid{grid-template-columns:1fr;gap:10px}.categories{gap:8px}.cat-btn{padding:8px 14px;font-size:.82rem}.age-tab{padding:8px 20px;font-size:.82rem}.header-right{align-self:flex-end}}
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <div class="header-left">
      <h1>Query <span>生产工具</span></h1>
      <p>选择人群 · 选择方向 · 实时生成 · 点击复制</p>
    </div>
    <div class="header-right">
      <div class="hot-badge" id="hotBadge" style="display:none"><span id="hotStatus">热榜已同步</span></div>
      <div class="copy-counter" id="copyCounter">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>
        <span>已复制 <strong id="copyCount">0</strong> 条</span>
      </div>
    </div>
  </header>
  <section class="age-section">
    <div class="section-label">人群选择</div>
    <div class="age-tabs" id="ageTabs">
      <button class="age-tab active" data-age="young">20 - 30 岁</button>
      <button class="age-tab" data-age="middle">30 - 50 岁</button>
    </div>
  </section>
  <section class="categories-section">
    <div class="section-label">方向选择</div>
    <div class="categories" id="categories"></div>
  </section>
  <section class="query-section" id="querySection">
    <div class="empty-state" id="emptyState"><div class="empty-icon">↑</div><p>选择一个方向，开始生成 Query</p></div>
    <div class="query-grid" id="queryGrid" style="display:none;"></div>
    <div class="refresh-area" id="refreshArea" style="display:none;">
      <button class="refresh-btn" id="refreshBtn" onclick="refreshBatch()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        换一批（重新生成）
      </button>
    </div>
  </section>
  <footer class="footer">Query生产工具 · 每次换一批均为全新生成 · 热榜话题自动融入</footer>
</div>
<div class="toast" id="toast"></div>

let hotTopics = [];
const HOT_TEMPLATES = [
  "最近都在聊{v}，到底怎么回事？",
  "{v}突然上热搜了，有人能客观分析吗？",
  "朋友圈都在转{v}，跟普通人有关系吗？",

  "{v}到底是怎么回事？求靠谱解读。",
  "刷到好多人讨论{v}，有靠谱信息源吗？",
  "身边人都在关注{v}，普通人要做什么准备吗？",
];

async function fetchHotTopics() {
  const badge = document.getElementById('hotBadge');
  const status = document.getElementById('hotStatus');
  badge.style.display = 'flex';
  status.textContent = '正在同步热榜...';
  const apis = [
    'https://api.vvhan.com/api/hotlist/wbHot',
    'https://api.vvhan.com/api/hotlist/douyinHot',
    'https://api.vvhan.com/api/hotlist/baiduRD',
  ];
  for (const api of apis) {
    try {
      const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(api);
      const resp = await fetch(proxy, {signal: AbortSignal.timeout(5000)});
      const json = await resp.json();
      const data = JSON.parse(json.contents);
      if (data && data.data && Array.isArray(data.data)) {
        const items = data.data.slice(0, 20).map(d => ({
          title: (d.title || d.name || '').replace(/#/g,'').trim(),
          source: api.includes('wb') ? '微博' : api.includes('douyin') ? '抖音' : '百度'
        })).filter(d => d.title.length > 2 && d.title.length < 30);
        hotTopics = hotTopics.concat(items);
      }
    } catch(e) {}
  }
  const seen = new Set();
  hotTopics = hotTopics.filter(h => { if (seen.has(h.title)) return false; seen.add(h.title); return true; });
  if (hotTopics.length > 0) {
    status.textContent = `热榜已同步 ${hotTopics.length} 条`;
    badge.classList.remove('offline');
  } else {
    status.textContent = '热榜离线 · 模板生成中';
    badge.classList.add('offline');
  }
}

// === GENERATION ENGINE ===
const generatedHistory = new Set();

function fillTemplate(pattern, values) {
  if (!values || values === '') return pattern; // static query, no slot to fill
  if (pattern.includes('{v2}')) {
    const parts = values.split(';');
    const pair = parts[Math.floor(Math.random() * parts.length)];
    if (pair.includes('|')) {
      const vals = pair.split('|');
      return pattern.replace('{v}', vals[0]).replace('{v2}', vals[1] || vals[0]);
    }
    return pattern.replace('{v}', pair).replace('{v2}', pair);
  }
  const vals = values.split('|');
  return pattern.replace('{v}', vals[Math.floor(Math.random() * vals.length)]);
}

function generateQueries(ageGroup, category, count = 12) {
  if (category === 'trending') return generateTrendingQueries(count);
  const factory = F[ageGroup] && F[ageGroup][category];
  if (!factory) return [];
  const results = [], localSeen = new Set();
  let attempts = 0;
  const maxAttempts = count * 10;
  const templateCount = Math.ceil(count * 0.7);
  const seedCount = Math.ceil(count * 0.2);
  const hotCount = count - templateCount - seedCount;

  while (results.length < templateCount && attempts < maxAttempts) {
    attempts++;
    const tmpl = factory.t[Math.floor(Math.random() * factory.t.length)];
    const q = fillTemplate(tmpl[0], tmpl[1]);
    if (q && !localSeen.has(q) && !generatedHistory.has(q)) { localSeen.add(q); results.push({text: q, hot: false}); }
  }
  const seeds = [...factory.s].sort(() => Math.random() - 0.5);
  for (let i = 0; i < Math.min(seedCount, seeds.length); i++) {
    if (!localSeen.has(seeds[i])) { localSeen.add(seeds[i]); results.push({text: seeds[i], hot: false}); }
  }
  if (hotTopics.length > 0 && hotCount > 0) {
    const sh = [...hotTopics].sort(() => Math.random() - 0.5);
    for (let i = 0; i < Math.min(hotCount, sh.length); i++) {
      const tmpl = HOT_TEMPLATES[Math.floor(Math.random() * HOT_TEMPLATES.length)];
      const q = tmpl.replace('{v}', sh[i].title);
      if (!localSeen.has(q)) { localSeen.add(q); results.push({text: q, hot: true, source: sh[i].source}); }
    }
  }
  while (results.length < count && attempts < maxAttempts * 2) {
    attempts++;
    const tmpl = factory.t[Math.floor(Math.random() * factory.t.length)];
    const q = fillTemplate(tmpl[0], tmpl[1]);
    if (q && !localSeen.has(q) && !generatedHistory.has(q)) { localSeen.add(q); results.push({text: q, hot: false}); }
  }
  results.forEach(r => generatedHistory.add(r.text));
  if (generatedHistory.size > 200) {
    const arr = [...generatedHistory]; arr.splice(0, arr.length - 200);
    generatedHistory.clear(); arr.forEach(a => generatedHistory.add(a));
  }
  return results.sort(() => Math.random() - 0.5).slice(0, count);
}

function generateTrendingQueries(count) {
  if (hotTopics.length === 0) return [{text: '热榜数据正在加载中，请稍后点击换一批……', hot: false}];
  const results = [], localSeen = new Set();
  const shuffled = [...hotTopics].sort(() => Math.random() - 0.5);
  for (let i = 0; i < shuffled.length && results.length < count; i++) {
    const t = shuffled[i].title;
    if (!localSeen.has(t) && !generatedHistory.has(t)) {
      localSeen.add(t); results.push({text: t, hot: true, source: shuffled[i].source});
    }
  }
  results.forEach(r => generatedHistory.add(r.text));
  if (generatedHistory.size > 200) {
    const arr = [...generatedHistory]; arr.splice(0, arr.length - 200);
    generatedHistory.clear(); arr.forEach(a => generatedHistory.add(a));
  }
  return results;
}

function renderBatch() {
  const queries = generateQueries(currentAge, currentCategory, 12);

    card.className = 'query-card' + (q.hot ? ' from-hot' : '');
    card.setAttribute('data-source', q.source || '热');
    card.style.animationDelay = `${i * 0.04}s`;
    const escaped = q.text.replace(/'/g, "\\'");
    card.innerHTML = `<span class="query-text">${q.text}</span>
      <button class="copy-btn" title="复制" onclick="event.stopPropagation();copyQuery(this,'${escaped}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      </button>`;
    card.onclick = () => copyQuery(card.querySelector('.copy-btn'), q.text);
    grid.appendChild(card);
  });
  refreshArea.style.animation = 'none'; refreshArea.offsetHeight; refreshArea.style.animation = '';
}

function refreshBatch() {
  const btn = document.getElementById('refreshBtn');
  btn.querySelector('svg').style.transition = 'transform 0.5s ease';
  btn.querySelector('svg').style.transform = `rotate(${Math.random()*720+360}deg)`;
  setTimeout(() => { btn.querySelector('svg').style.transform = ''; }, 600);
  renderBatch();
}

function copyQuery(btnEl, text) {
  navigator.clipboard.writeText(text).then(() => {
    copyCount++;
    document.getElementById('copyCount').textContent = copyCount;
    const counter = document.getElementById('copyCounter');
    counter.classList.remove('bump'); void counter.offsetWidth; counter.classList.add('bump');
    const card = btnEl.closest('.query-card');
    card.classList.add('copied'); setTimeout(() => card.classList.remove('copied'), 600);
    showToast(`已复制「${text.length > 18 ? text.slice(0,18)+'…' : text}」`);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    copyCount++; document.getElementById('copyCount').textContent = copyCount;
    showToast('已复制');
  });
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg; toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1600);
}
